[pytest]
# Scope collection to tests/ so a bare `pytest` from the repo root doesn't recurse into the
# cloned / materialized targets under targets/ (each carries its own test files → collection
# errors). The canonical invocation is `.venv/bin/python -m pytest tests/`. (Review P2.)
testpaths = tests
norecursedirs = targets cell-1 vendor .venv tool/webapp .git
